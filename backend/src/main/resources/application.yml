server:
  port: ${PORT:8080}

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:social_share}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:${MYSQLUSER:root}}
    password: ${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD:200511}}
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.social.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.example.social.mapper: debug

app:
  upload-dir: ${APP_UPLOAD_DIR:uploads}
  cors-allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173}
